server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API routes to the backend service
    location /campgrounds {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
    }

    location /search {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
